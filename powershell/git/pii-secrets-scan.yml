# Layer 4: Server-Side PII & Secrets Scan — GitHub Actions Workflow
# ──────────────────────────────────────────────────────────────────
# Drop this file into any repo at .github/workflows/pii-secrets-scan.yml
# to enforce server-side scanning on every PR and push.
#
# This is the CI complement to the local pre-commit hook.
# Even if a developer bypasses the hook (--no-verify), this catches it.
#
# SETUP:
#   1. Copy this file to <repo>/.github/workflows/pii-secrets-scan.yml
#   2. Set SCRIPTS_REPO_PATH or adjust the path to Test-PreCommitPii.ps1
#   3. Optionally enable GitHub Advanced Security push protection
#   4. Mark this check as "required" in branch protection rules

name: "PII & Secrets Scan"

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  pii-secrets-scan:
    name: "Layer 4: Server-Side Secret Scan"
    runs-on: ubuntu-latest  # or windows-latest for full PowerShell compatibility

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff

      - name: Checkout scripts repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          path: .scripts
          token: ${{ secrets.SCRIPTS_REPO_TOKEN }}  # PAT with repo read access

      - name: Run PII & Secrets Scanner
        shell: pwsh
        env:
          # Point to the central .env for Layer 2 value matching
          # In CI, you may choose to skip Layer 2 (no .env available)
          # or mount secrets as a secure file
          PRECOMMIT_PII_SCRIPT: .scripts/powershell/git/Test-PreCommitPii.ps1
        run: |
          $scannerPath = $env:PRECOMMIT_PII_SCRIPT

          if (-not (Test-Path $scannerPath)) {
            Write-Error "Scanner not found at $scannerPath"
            exit 1
          }

          # Get the diff for this PR/push
          $baseSha = "${{ github.event.pull_request.base.sha }}"
          if (-not $baseSha) {
            # Push event: compare against parent
            $baseSha = "${{ github.event.before }}"
          }

          if (-not $baseSha -or $baseSha -eq '0000000000000000000000000000000000000000') {
            Write-Host "Initial commit or no base — scanning all files"
            $diffFiles = git diff --name-only HEAD
          } else {
            $diffFiles = git diff --name-only $baseSha HEAD
          }

          if (-not $diffFiles) {
            Write-Host "✅ No changed files to scan"
            exit 0
          }

          Write-Host "Scanning $($diffFiles.Count) changed file(s)..."

          # Run scanner in DryRun mode first to collect findings
          # Then fail if blocks found
          & $scannerPath -DryRun -Verbose
          $scanResult = $LASTEXITCODE

          if ($scanResult -ne 0) {
            Write-Host ""
            Write-Host "❌ PII/Secret scan FAILED — review findings above" -ForegroundColor Red
            Write-Host "   This PR cannot be merged until issues are resolved." -ForegroundColor Yellow
            exit 1
          }

          Write-Host "✅ PII/Secret scan passed" -ForegroundColor Green

      # Optional: GitHub Advanced Security secret scanning
      # Uncomment if your org has GHAS enabled
      # - name: GitHub Secret Scanning
      #   uses: github/advanced-security/secret-scanning-action@v1
